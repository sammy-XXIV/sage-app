<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SAGE — STON.fi AI Agent</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#05080f;
  --s1:#0b1018;--s2:#0f1520;--s3:#131c2a;
  --b0:rgba(255,255,255,0.05);
  --b1:rgba(255,255,255,0.08);
  --t1:#dde6f5;--t2:#7a8dab;--t3:#3a4d68;
  --green:#2ecc8f;--red:#e05c5c;--yellow:#f0b832;--purple:#8b6ff0;
  /* Mode accent — changed by JS */
  --ac:#479DFF;
  --ac-dim:rgba(71,157,255,0.10);
  --ac-glow:rgba(71,157,255,0.22);
  --ac-border:rgba(71,157,255,0.28);
  --font:'Syne',sans-serif;
  --mono:'DM Mono',monospace;
  --r:14px;--r2:10px;--r3:22px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--t1);overflow:hidden;font-size:14px}

/* ── Canvas + Orbs ── */
#cv{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.7}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px);transition:background 1s ease}
.orb1{width:500px;height:500px;top:-180px;left:-120px;background:radial-gradient(circle,var(--ac-dim),transparent 70%);animation:o1 14s ease-in-out infinite}
.orb2{width:340px;height:340px;bottom:-120px;right:-80px;background:radial-gradient(circle,rgba(139,111,240,.04),transparent 70%);animation:o2 18s ease-in-out infinite}
@keyframes o1{0%,100%{transform:scale(1) translate(0,0)}40%{transform:scale(1.12) translate(28px,-18px)}70%{transform:scale(.96) translate(-12px,22px)}}
@keyframes o2{0%,100%{transform:scale(1)}55%{transform:scale(1.08) translate(-20px,-25px)}}

/* ── App shell ── */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto}

/* ── Header ── */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 8px;
  background:rgba(5,8,15,.85);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid var(--b0);
  flex-shrink:0;
  animation:sDown .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes sDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

.hdr-l{display:flex;align-items:center;gap:9px}
.logo{
  width:32px;height:32px;
  background:linear-gradient(135deg,var(--ac),var(--ac2,#1a6fd4));
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;
  animation:lPulse 4s ease-in-out infinite;
  transition:background .6s ease;
}
@keyframes lPulse{0%,100%{box-shadow:0 0 10px var(--ac-dim)}50%{box-shadow:0 0 22px var(--ac-glow),0 0 40px var(--ac-dim)}}
.hdr-txt h1{font-size:14px;font-weight:800;letter-spacing:.5px;line-height:1;color:var(--t1)}
.hdr-txt p{font-size:9px;color:var(--t2);margin-top:2px;font-family:var(--mono);display:flex;align-items:center;gap:4px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:sdPulse 2s ease-in-out infinite;display:inline-block}
@keyframes sdPulse{0%,100%{opacity:1}50%{opacity:.5}}

#wBtn{
  display:flex;align-items:center;gap:5px;
  background:var(--ac-dim);border:1px solid var(--ac-border);
  border-radius:20px;padding:6px 11px;
  font-size:10px;font-weight:700;color:var(--ac);
  cursor:pointer;font-family:var(--font);
  transition:all .22s cubic-bezier(.16,1,.3,1);
  white-space:nowrap;letter-spacing:.3px;
}
#wBtn:active{transform:scale(.94)}
#wBtn.on{background:rgba(46,204,143,.1);border-color:rgba(46,204,143,.28);color:var(--green)}
.wdot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;animation:sdPulse 2s ease-in-out infinite}

/* ── Marquee ticker ── */
#tickerWrap{
  overflow:hidden;border-bottom:1px solid var(--b0);
  flex-shrink:0;padding:0;
  background:rgba(5,8,15,.5);
  animation:sDown .5s cubic-bezier(.16,1,.3,1) .06s both;
}
#tickerTrack{
  display:flex;gap:0;
  animation:marquee 28s linear infinite;
  width:max-content;
}
#tickerTrack:hover{animation-play-state:paused}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;border-right:1px solid var(--b0);
  cursor:default;white-space:nowrap;
  transition:background .2s;
}
.tk:hover{background:var(--s1)}
.tk-pair{font-size:9px;font-weight:700;color:var(--t2);letter-spacing:.7px;font-family:var(--mono)}
.tk-price{font-size:11px;font-weight:700;color:var(--t1);font-family:var(--mono)}
.tk-ch{font-size:9px;font-family:var(--mono);font-weight:600;padding:2px 5px;border-radius:4px}
.tk-ch.up{color:var(--green);background:rgba(46,204,143,.1)}
.tk-ch.dn{color:var(--red);background:rgba(224,92,92,.1)}

/* ── Chat ── */
#chat{
  flex:1;overflow-y:auto;
  padding:12px 14px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
#chat::-webkit-scrollbar{width:2px}
#chat::-webkit-scrollbar-track{background:transparent}
#chat::-webkit-scrollbar-thumb{background:var(--t3);border-radius:2px}

/* Welcome */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:20px;gap:13px}
.wi{
  width:66px;height:66px;
  background:linear-gradient(135deg,var(--ac-dim),rgba(71,157,255,.03));
  border:1px solid var(--ac-border);border-radius:20px;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  animation:wiIn .7s cubic-bezier(.16,1,.3,1) .3s both,wFloat 5s ease-in-out 1s infinite;
  transition:border-color .6s,background .6s;
}
@keyframes wiIn{from{opacity:0;transform:scale(.45) rotate(-14deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes wFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.wt{font-size:21px;font-weight:800;letter-spacing:-.4px;animation:fUp .5s cubic-bezier(.16,1,.3,1) .44s both}
.ws{font-size:12px;color:var(--t2);line-height:1.6;max-width:265px;animation:fUp .5s cubic-bezier(.16,1,.3,1) .54s both}
@keyframes fUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;animation:fUp .5s cubic-bezier(.16,1,.3,1) .64s both}
.chip{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:20px;padding:6px 12px;
  font-size:11px;color:var(--t2);cursor:pointer;
  transition:all .22s cubic-bezier(.16,1,.3,1);
  font-family:var(--font);font-weight:500;
  position:relative;overflow:hidden;
}
.chip::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,var(--ac-dim),transparent 70%);opacity:0;transition:opacity .3s}
.chip:hover{border-color:var(--ac-border);color:var(--ac);transform:translateY(-1px);box-shadow:0 4px 14px var(--ac-dim)}
.chip:hover::after{opacity:1}
.chip:active{transform:scale(.95)}

/* Messages */
.msg{display:flex;flex-direction:column;gap:3px;animation:mIn .3s cubic-bezier(.16,1,.3,1) both}
@keyframes mIn{from{opacity:0;transform:translateY(9px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.user{align-items:flex-end}
.msg.ai{align-items:flex-start}

/* AI message row with avatar */
.ai-row{display:flex;align-items:flex-start;gap:7px;max-width:88%}
.sage-av{
  width:24px;height:24px;flex-shrink:0;
  background:linear-gradient(135deg,var(--ac),var(--ac2,#1a6fd4));
  border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;
  margin-top:2px;
  box-shadow:0 0 8px var(--ac-dim);
  transition:background .6s;
}
.ai-content{display:flex;flex-direction:column;gap:8px;flex:1}

.bubble{
  padding:10px 13px;border-radius:14px;
  font-size:13px;line-height:1.55;word-break:break-word;
}
.msg.user .bubble{
  background:linear-gradient(135deg,#2b6be0,#1847b0);
  color:#fff;border-bottom-right-radius:3px;
  max-width:82%;position:relative;overflow:hidden;
}
.msg.user .bubble::before{
  content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
  animation:shine 2s ease .2s both;
}
@keyframes shine{0%{left:-100%}100%{left:200%}}
.msg.ai .bubble{
  background:var(--s1);border:1px solid var(--b1);
  color:var(--t1);border-bottom-left-radius:3px;
}
.msg-t{font-size:9px;color:var(--t3);padding:0 3px;font-family:var(--mono)}

/* ── Action cards — glassmorphism ── */
.acard{
  background:rgba(11,16,24,.75);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--ac-border);
  border-radius:var(--r);
  padding:14px;width:100%;
  position:relative;overflow:hidden;
  animation:acIn .48s cubic-bezier(.16,1,.3,1) .08s both;
  box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);
  transition:border-color .6s;
}
@keyframes acIn{from{opacity:0;transform:translateY(8px) scale(.975)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Colored top accent line */
.acard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--ac),transparent);
  animation:scanLine 3.5s ease-in-out .5s infinite;
}
@keyframes scanLine{0%{transform:translateX(-100%);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateX(100%);opacity:0}}

/* Subtle grid texture */
.acard::after{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:20px 20px;
  pointer-events:none;
}

.alabel{
  font-size:9px;font-weight:700;color:var(--ac);
  text-transform:uppercase;letter-spacing:1.2px;
  margin-bottom:12px;font-family:var(--mono);
  display:flex;align-items:center;gap:6px;
  position:relative;z-index:1;
  transition:color .6s;
}
.alabel-icon{
  width:18px;height:18px;
  background:var(--ac-dim);border:1px solid var(--ac-border);
  border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;
  transition:background .6s,border-color .6s;
}

/* All card content above the texture */
.acard > *:not(.acard::before):not(.acard::after){position:relative;z-index:1}
.drows{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;position:relative;z-index:1}
.dr{display:flex;justify-content:space-between;align-items:center;font-size:11px}
.dl{color:var(--t2)}
.dv{color:var(--t1);font-family:var(--mono);font-weight:500}
.dv.g{color:var(--green)}.dv.y{color:var(--yellow)}.dv.r{color:var(--red)}.dv.p{color:var(--purple)}.dv.ac{color:var(--ac);transition:color .6s}

/* Swap tokens */
.srow{display:flex;align-items:center;gap:7px;margin-bottom:12px;position:relative;z-index:1}
.stok{
  flex:1;background:rgba(5,8,15,.6);
  border:1px solid var(--b1);border-radius:var(--r2);
  padding:10px;text-align:center;
}
.stok-s{font-size:15px;font-weight:800;color:var(--t1)}
.stok-a{font-size:10px;color:var(--t2);font-family:var(--mono);margin-top:2px}
.sarr{color:var(--ac);font-size:18px;flex-shrink:0;animation:arrP 2s ease-in-out infinite;transition:color .6s}
@keyframes arrP{0%,100%{transform:translateX(0);opacity:1}50%{transform:translateX(3px);opacity:.5}}

/* Risk bar */
.rbar{
  display:flex;align-items:center;gap:7px;
  padding:8px 10px;border-radius:var(--r2);
  font-size:11px;margin-bottom:12px;
  position:relative;z-index:1;
}
.rbar.low{background:rgba(46,204,143,.08);border:1px solid rgba(46,204,143,.2);color:var(--green)}
.rbar.med{background:rgba(240,184,50,.08);border:1px solid rgba(240,184,50,.2);color:var(--yellow)}
.rbar.high{background:rgba(224,92,92,.08);border:1px solid rgba(224,92,92,.2);color:var(--red)}

/* Pool/Farm list */
.plist{display:flex;flex-direction:column;gap:5px;position:relative;z-index:1}
.pitem{
  background:rgba(5,8,15,.5);border:1px solid var(--b1);
  border-radius:var(--r2);padding:9px 11px;
  display:flex;align-items:center;justify-content:space-between;
  transition:border-color .2s;cursor:pointer;
}
.pitem:hover{border-color:var(--ac-border)}
.pn{font-size:12px;font-weight:700;color:var(--t1)}
.pm{font-size:9px;color:var(--t2);font-family:var(--mono);margin-top:2px}
.papr-v{font-size:13px;font-weight:800;color:var(--green);font-family:var(--mono)}
.papr-l{font-size:8px;color:var(--t2);font-family:var(--mono);text-align:right;margin-top:1px}

/* Stake duration */
.sdurs{display:flex;gap:5px;margin-bottom:12px;position:relative;z-index:1}
.sdur{
  flex:1;background:rgba(5,8,15,.5);
  border:1px solid var(--b1);border-radius:var(--r2);
  padding:7px 4px;text-align:center;cursor:pointer;transition:all .2s;
}
.sdur.sel{border-color:var(--ac-border);background:var(--ac-dim)}
.sdur-d{font-size:12px;font-weight:800;color:var(--t1)}
.sdur-g{font-size:9px;color:var(--t2);font-family:var(--mono);margin-top:2px}
.sdur-g b{color:var(--green)}

/* Limit order type */
.lotype{display:flex;gap:6px;margin-bottom:12px;position:relative;z-index:1}
.lobtn{
  flex:1;padding:8px;border-radius:var(--r2);
  font-size:12px;font-weight:700;
  border:1px solid var(--b1);background:rgba(5,8,15,.5);
  color:var(--t2);cursor:pointer;font-family:var(--font);transition:all .2s;text-align:center;
}
.lobtn.buy.sel{background:rgba(46,204,143,.08);border-color:rgba(46,204,143,.28);color:var(--green)}
.lobtn.sell.sel{background:rgba(224,92,92,.08);border-color:rgba(224,92,92,.28);color:var(--red)}

/* Strategy steps */
.steps{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;position:relative;z-index:1}
.step{
  display:flex;align-items:flex-start;gap:10px;
  background:rgba(5,8,15,.5);border:1px solid var(--b1);
  border-radius:var(--r2);padding:10px;
}
.step-num{
  width:20px;height:20px;flex-shrink:0;
  background:var(--ac-dim);border:1px solid var(--ac-border);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:var(--ac);font-family:var(--mono);
  transition:background .6s,border-color .6s,color .6s;
}
.step-body{flex:1}
.step-title{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:3px}
.step-detail{font-size:10px;color:var(--t2);font-family:var(--mono)}
.step-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;float:right;font-family:var(--mono)}
.step-badge.swap{background:var(--ac-dim);color:var(--ac);border:1px solid var(--ac-border)}
.step-badge.liq{background:rgba(46,204,143,.1);color:var(--green);border:1px solid rgba(46,204,143,.25)}
.step-badge.farm{background:rgba(139,111,240,.1);color:var(--purple);border:1px solid rgba(139,111,240,.25)}
.step-badge.stake{background:rgba(240,184,50,.1);color:var(--yellow);border:1px solid rgba(240,184,50,.25)}

/* Portfolio card */
.pfsum{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
  margin-bottom:12px;position:relative;z-index:1;
}
.pfbox{
  background:rgba(5,8,15,.5);border:1px solid var(--b1);
  border-radius:var(--r2);padding:8px;text-align:center;
}
.pfbox-v{font-size:14px;font-weight:800;color:var(--t1);font-family:var(--mono)}
.pfbox-l{font-size:9px;color:var(--t2);margin-top:2px;font-family:var(--mono)}
.pfbox-ch{font-size:9px;font-family:var(--mono);margin-top:1px}

/* Alert card */
.alert-item{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(5,8,15,.5);border:1px solid var(--b1);
  border-radius:var(--r2);padding:9px 11px;margin-bottom:5px;
  position:relative;z-index:1;
}
.alert-l{flex:1}
.alert-title{font-size:11px;font-weight:700;color:var(--t1)}
.alert-cond{font-size:9px;color:var(--t2);font-family:var(--mono);margin-top:2px}
.alert-toggle{
  width:32px;height:18px;background:var(--s2);
  border:1px solid var(--b1);border-radius:9px;
  cursor:pointer;position:relative;transition:all .25s;
  flex-shrink:0;
}
.alert-toggle.on{background:var(--green);border-color:var(--green)}
.alert-toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:12px;height:12px;border-radius:50%;background:#fff;
  transition:transform .25s cubic-bezier(.16,1,.3,1);
}
.alert-toggle.on::after{transform:translateX(14px)}

/* Positions */
.pos-item{
  background:rgba(5,8,15,.5);border:1px solid var(--b1);
  border-radius:var(--r2);padding:10px 11px;margin-bottom:5px;
  position:relative;z-index:1;
}
.pos-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.pos-badge{font-size:8px;font-weight:700;padding:2px 7px;border-radius:8px;font-family:var(--mono);letter-spacing:.5px}
.pos-badge.lp{background:var(--ac-dim);color:var(--ac);border:1px solid var(--ac-border)}
.pos-badge.farm{background:rgba(139,111,240,.1);color:var(--purple);border:1px solid rgba(139,111,240,.25)}
.pos-badge.stake{background:rgba(46,204,143,.1);color:var(--green);border:1px solid rgba(46,204,143,.25)}

/* Confirm button */
.cbtn{
  width:100%;
  background:linear-gradient(135deg,var(--ac),var(--ac2,#1a6fd4));
  border:none;border-radius:var(--r2);
  padding:13px;font-size:13px;font-weight:700;
  color:#fff;cursor:pointer;font-family:var(--font);
  transition:all .22s cubic-bezier(.16,1,.3,1);
  position:relative;overflow:hidden;z-index:1;
  letter-spacing:.2px;
}
.cbtn.g{background:linear-gradient(135deg,#2ecc8f,#1a9962)}
.cbtn.p{background:linear-gradient(135deg,#8b6ff0,#6347c7)}
.cbtn.y{background:linear-gradient(135deg,#f0b832,#c98b1e)}
.cbtn.r{background:linear-gradient(135deg,#e05c5c,#b03a3a)}
.cbtn::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(255,255,255,.2);border-radius:50%;transform:translate(-50%,-50%);transition:width .4s,height .4s,opacity .4s;opacity:0}
.cbtn:active::after{width:250px;height:250px;opacity:0}
.cbtn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 22px var(--ac-glow)}
.cbtn:active{transform:scale(.98)}
.cbtn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

/* Step execute btn */
.cbtn-step{
  width:100%;background:var(--ac-dim);border:1px solid var(--ac-border);
  border-radius:var(--r2);padding:11px;font-size:12px;font-weight:700;
  color:var(--ac);cursor:pointer;font-family:var(--font);
  transition:all .22s cubic-bezier(.16,1,.3,1);
  margin-top:8px;position:relative;z-index:1;
  transition:background .6s,border-color .6s,color .6s;
}
.cbtn-step:hover{background:var(--ac);color:#fff}
.cbtn-step:disabled{opacity:.3;cursor:not-allowed}

/* ── Typing ── */
.typing{
  display:flex;align-items:center;gap:8px;
  padding:10px 13px;background:var(--s1);
  border:1px solid var(--b1);border-radius:14px;border-bottom-left-radius:3px;

            for(let i=0;i<32;i++)bytes[2+i]=parseInt(hex.slice(i*2,i*2+2),16);
            let crc=0;for(let i=0;i<34;i++){crc^=bytes[i]<<8;for(let j=0;j<8;j++)crc=(crc&0x8000)?((crc<<1)^0x1021):(crc<<1);crc&=0xFFFF;}
            bytes[34]=(crc>>8)&0xFF;bytes[35]=crc&0xFF;
            walletAddr=btoa(String.fromCharCode(...bytes)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');

// ── Real Wallet Data ─────────────────────────────────────
async function fetchWalletData(address){
  if(!address) return null;
  try{
    const [lpRes, farmRes, opsRes, balRes, jetRes] = await Promise.all([
      fetch(`https://api.ston.fi/v1/wallets/${address}/lp_accounts`).catch(()=>null),
      fetch(`https://api.ston.fi/v1/wallets/${address}/farms`).catch(()=>null),
      fetch(`https://api.ston.fi/v1/wallets/${address}/operations?limit=20`).catch(()=>null),
      fetch(`https://tonapi.io/v2/accounts/${address}`).catch(()=>null),
      fetch(`https://tonapi.io/v2/accounts/${address}/jettons?currencies=usd`).catch(()=>null),
    ]);

    const [lpData, farmData, opsData, balData, jetData] = await Promise.all([
      lpRes?.ok  ? lpRes.json()  : null,
      farmRes?.ok ? farmRes.json() : null,
      opsRes?.ok  ? opsRes.json()  : null,
      balRes?.ok  ? balRes.json()  : null,
      jetRes?.ok  ? jetRes.json()  : null,
    ]);
    // Native TON balance from TONapi
    const tonBalance = balData?.balance ? parseFloat(balData.balance)/1e9 : 0;
    const tonPrice = market?.TON?.price || 0;
    const tonUSD = tonBalance * tonPrice;

    // Jettons from TONapi
    const jettons = (jetData?.balances || [])
      .filter(j => {
        if(j.jetton?.is_scam) return false;
        const bal = parseFloat(j.balance||0)/Math.pow(10, j.jetton?.decimals||9);
        const usd = parseFloat(j.price?.prices?.USD||0)*bal;
        return j.jetton?.verification && j.jetton.verification!=='none' ? bal>0 : usd>0.01;
      })
      .map(j => ({
        symbol: j.jetton?.symbol||'?',
        balance: parseFloat(j.balance||0)/Math.pow(10, j.jetton?.decimals||9),
        usd: parseFloat(j.price?.prices?.USD||0)*(parseFloat(j.balance||0)/Math.pow(10, j.jetton?.decimals||9)),
        address: j.jetton?.address,
      }));
    if(tonBalance > 0){
      totalUSD += tonUSD;
      positions.push({
        type: 'lp',
        name: 'TON (Native)',
        value: `$${tonUSD.toFixed(2)}`,
        lpBalance: tonBalance.toFixed(4),
        apr: null,
      });
    }

    const lps    = lpData?.lp_accounts  || [];
    const farms  = farmData?.farms      || [];
    const ops    = opsData?.operations  || [];

    // Calculate total value
    let totalUSD = 0;
    const positions = [];

    // LP positions
    for(const lp of lps){
      const val = parseFloat(lp.lp_balance_usd || 0);
      totalUSD += val;
      if(val > 0 || lp.lp_balance > 0){
        positions.push({
          type: 'lp',
          name: `${lp.token0_symbol}/${lp.token1_symbol}`,
          value: `$${val.toFixed(2)}`,
          lpBalance: lp.lp_balance,
          token0: lp.token0_symbol,
          token1: lp.token1_symbol,
          apr: lp.apy ? `${(parseFloat(lp.apy)*100).toFixed(1)}%` : null,
        });
      }
    }

    // Farm positions
    for(const farm of farms){
      const pending = parseFloat(farm.pending_reward || 0);
      const staked  = parseFloat(farm.staked_tokens  || 0);
      if(staked > 0 || pending > 0){
        positions.push({
          type: 'farm',
          name: farm.pool_name || farm.name || 'Farm',
          lp: staked.toFixed(4),
          reward: `${pending.toFixed(4)} ${farm.reward_token_symbol || 'STON'}`,
          apr: farm.apr ? `${parseFloat(farm.apr).toFixed(1)}%` : null,
        });
      }
    }

    // Recent swap history
    const swaps = ops
      .filter(o => o.operation_type === 'Swap')
      .slice(0,5)
      .map(o => ({
        from: o.from_asset_symbol,
        to:   o.to_asset_symbol,
        fromAmt: parseFloat(o.from_amount||0).toFixed(4),
        toAmt:   parseFloat(o.to_amount||0).toFixed(4),
        time: o.created_at,
      }));

    return {
      address,
      tonBalance: tonBalance.toFixed(4),
      tonUSD: tonUSD.toFixed(2),
      jettons,
      totalUSD: totalUSD.toFixed(2),
      positions,
      swaps,
      isEmpty: positions.length === 0 && jettons.length === 0 && tonBalance === 0,
    };
  }catch(e){
    console.log('Wallet fetch error:', e);
    return null;
  }
}

// ── Mode auto-detection from user message ─────────────────
function detectMode(msg){
  const m=msg.toLowerCase();
  if(m.includes('swap')||m.includes('exchange')||m.includes('buy')||m.includes('sell')&&!m.includes('limit')) return 'swap';
  if(m.includes('liquid')||m.includes('pool')||m.includes('lp')||m.includes('provide')) return 'liquidity';
  if(m.includes('farm')||m.includes('yield')||m.includes('harvest')) return 'farming';
  if(m.includes('stak')||m.includes('gemston')||m.includes('arkenston')||m.includes('lock')) return 'staking';
  if(m.includes('limit')||m.includes('order')||m.includes('target price')) return 'limitorder';
  if(m.includes('strateg')||m.includes('maximize')||m.includes('best way')||m.includes('plan')) return 'strategy';
  if(m.includes('portfolio')||m.includes('position')||m.includes('balance')||m.includes('holdings')) return 'portfolio';
  if(m.includes('alert')||m.includes('notify')||m.includes('when price')) return 'alerts';
  return mode; // keep current
}

function parseCard(t,tag){
  const m=t.match(new RegExp(`<${tag}>([\\s\\S]*?)<\\/${tag}>`));
  if(!m)return null;
  try{return JSON.parse(m[1].trim())}catch{return null}
}
function strip(t){
  return t.replace(/<(SWAP|LIQ|POOLS|FARM|FARMS|STAKE|LIMIT|STRATEGY|PF|ALERT|POS)_CARD>[\s\S]*?<\/\1_CARD>/g,'').trim();
}

function renderAI(text){
  let html='';
  const clean=strip(text);
  if(clean)html+=`<div class="bubble">${fmt(clean)}</div>`;

  const cards=[
    ['SWAP_CARD',rSwap],['LIQ_CARD',rLiq],['POOLS_CARD',rPools],
    ['FARM_CARD',rFarm],['FARMS_CARD',rFarms],['STAKE_CARD',rStake],
    ['LIMIT_CARD',rLimit],['STRATEGY_CARD',rStrategy],
    ['PF_CARD',rPortfolio],['ALERT_CARD',rAlerts],['POS_CARD',rPos]
  ];
  cards.forEach(([tag,fn])=>{const d=parseCard(text,tag);if(d)html+=fn(d)});
  return html;
}

async function exec(type, data, btn){
  if(!walletOK){ toast('Connect wallet first'); await tcUI?.openModal(); return; }
  if(!tcUI){ toast('Wallet not ready'); return; }

  btn.disabled = true;
  btn.textContent = 'Getting best rate…';

  try{
    let transaction = null;

    // ── Swap ──────────────────────────────────────────────
    if(type === 'swap'){
      btn.textContent = 'Simulating swap…';
      const fromAddr = getAddr(data.fromToken) || data.fromTokenAddr;
      const toAddr   = getAddr(data.toToken)   || data.toTokenAddr;
      if(!fromAddr || !toAddr) throw new Error(`Unknown token: ${!fromAddr?data.fromToken:data.toToken}`);
      const res = await fetch(`${SWAP}/build/swap`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fromToken: fromAddr,
          toToken:   toAddr,
          fromAmount: data.fromAmount,
          walletAddress: walletAddr,
          slippage: parseFloat(data.slippage || '1') / 100,
        })
      });
      const result = await res.json();
      if(!result.ok) throw new Error(result.error || 'Swap build failed');
      clearTimeout(_wu);
      transaction = result.transaction;
      toast(`⚡ Rate locked · Impact: ${result.simulation.priceImpact || '<0.1'}%`);
    }

    // ── Liquidity ─────────────────────────────────────────
    else if(type === 'liquidity'){
      btn.textContent = 'Simulating liquidity…';
      const tokenAAddr = getAddr(data.t0) || data.tokenAAddr;
      const tokenBAddr = getAddr(data.t1) || data.tokenBAddr;
      if(!tokenAAddr || !tokenBAddr) throw new Error('Unknown token in pair');
      const res = await fetch(`${SWAP}/build/liquidity`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tokenA: tokenAAddr,
          tokenB: tokenBAddr,
          amountA: data.a0,
          walletAddress: walletAddr,
        })
      });
      const result = await res.json();
      if(!result.ok) throw new Error(result.error || 'Liquidity build failed');
      transaction = result.transaction;
      toast('💧 Liquidity tx ready');
    }

    // ── Farming ───────────────────────────────────────────
    else if(type === 'farming'){
      // Farm staking requires LP token address from the pool
      // For now guide user to STON.fi directly with context
      toast('🌾 Opening STON.fi farm…');
      const farmUrl = `https://app.ston.fi/farms`;
      if(tg?.openLink) tg.openLink(farmUrl);
      else window.open(farmUrl, '_blank');
      btn.disabled = false;
      btn.textContent = 'View on STON.fi ↗';
      return;
    }

    // ── Staking ───────────────────────────────────────────
    else if(type==='staking'){
      if(data.stakeTon){
        btn.textContent='Staking TON…';
        const res=await fetch(`${SWAP}/build/tonstake`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({walletAddress:walletAddr,amount:data.amount})});
        const result=await res.json();
        if(!result.ok)throw new Error(result.error||'TON stake failed');
        transaction=result.transaction;
        toast(`🔒 Staking ${data.amount} TON → tsTON`);
      }else{
        toast('🔒 Opening STON.fi staking…');
        const u='https://app.ston.fi/staking';
        if(tg?.openLink)tg.openLink(u);else window.open(u,'_blank');
        btn.disabled=false;btn.textContent='View on STON.fi ↗';return;
      }
    }

    // ── Limit Orders ──────────────────────────────────────
    else if(type === 'limitorder'){
      toast('📋 Opening STON.fi limit orders…');
      const loUrl = `https://app.ston.fi/limit-orders`;
      if(tg?.openLink) tg.openLink(loUrl);
      else window.open(loUrl, '_blank');
      btn.disabled = false;
      btn.textContent = 'View on STON.fi ↗';
      return;
    }

    else {
      toast('Coming soon');
      btn.disabled = false;
      return;
    }

    // ── Send to TON Connect for signing ───────────────────
    if(transaction){
      btn.textContent = 'Confirm in wallet…';
      toast('⚡ Opening wallet to confirm…');
      await tcUI.sendTransaction(transaction);
      btn.textContent = '✓ Transaction sent';
      btn.style.background = 'linear-gradient(135deg,#2ecc8f,#1a9962)';
      toast('✅ Transaction submitted!', 4000);
      // Refresh wallet data after tx
      setTimeout(()=>refreshWalletData(), 3000);
      setTimeout(()=>refreshWalletData(), 8000);
      addH('system', `${type} executed: ${JSON.stringify(data)}`);
    }

  } catch(e) {
    btn.disabled = false;
    const _isSl=e.message?.toLowerCase().includes('slippage')||e.message?.toLowerCase().includes('min_ask');
    btn.textContent=e.message?.includes('User rejected')?'Cancelled':_isSl?'↑ Retry with 3% slippage':'Retry — '+(e.message||'Error');
    if(_isSl&&type==='swap'){btn.onclick=()=>{btn.onclick=null;exec('swap',{...data,slippage:'3'},btn);};}
    toast('❌ ' + (e.message || 'Transaction failed'));
    console.error('exec error:', e);
  }
}

async function execStrategy(data,btn){
  if(!walletOK){toast('Connect wallet first');await tcUI?.openModal();return}
  btn.disabled=true;
  const steps=data.steps||[];
  for(let i=0;i<steps.length;i++){
    btn.textContent=`Step ${i+1}/${steps.length}: ${steps[i].title}…`;
    toast(`⚡ Step ${i+1}: ${steps[i].title}`);
    await new Promise(r=>setTimeout(r,1800));
  }
  btn.textContent=`✓ All ${steps.length} steps complete`;
  btn.style.background='linear-gradient(135deg,#2ecc8f,#1a9962)';
  toast('✓ Strategy executed!',3500);
}

// ── UI helpers ────────────────────────────────────────────
function fmt(t){return esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}
function fmt2ai(t){return`<div class="bubble">${fmt(t)}</div>`}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function esc2(d){return JSON.stringify(d).replace(/"/g,'&quot;')}
function ts(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}
function autoH(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,78)+'px'}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
function hideW(){const w=document.getElementById('welcome');if(w)w.remove()}
function scrollBot(){const c=document.getElementById('chat');setTimeout(()=>c.scrollTop=c.scrollHeight,60)}

function addMsg(role,html,t){
  hideW();
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  if(role==='ai'){
    div.innerHTML=`<div class="ai-row"><div class="sage-av">S</div><div class="ai-content">${html}</div></div><div class="msg-t">${t||ts()}</div>`;
  }else{
    div.innerHTML=html+`<div class="msg-t">${t||ts()}</div>`;
  }
  document.getElementById('chat').appendChild(div);
  scrollBot();
}

function showTyping(){
  const div=document.createElement('div');
  div.className='msg ai';div.id='typing';
  div.innerHTML=`<div class="ai-row"><div class="sage-av">S</div><div class="typing"><div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div><span class="tt">SAGE thinking…</span></div></div>`;
  document.getElementById('chat').appendChild(div);scrollBot();
}
function rmTyping(){document.getElementById('typing')?.remove()}

// ── Send ──────────────────────────────────────────────────
async function send(){
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();
  if(!txt||busy)return;
  inp.value='';inp.style.height='auto';
  document.getElementById('sbtn').disabled=true;
  busy=true;

  mode=detectMode(txt);
  applyAccent(mode);
  addMsg('user',`<div class="bubble">${esc(txt)}</div>`);
  addH('user',txt);showTyping();

  try{
    const resp=await askAI(txt);
    rmTyping();
    const aiHtml=renderAI(resp);
    addMsg('ai',`<div class="ai-content">${aiHtml}</div>`);
    addH('assistant',resp);
  }catch{
    rmTyping();
    addMsg('ai',`<div class="ai-content"><div class="bubble">Connection issue — try again.</div></div>`);
  }
  document.getElementById('sbtn').disabled=false;busy=false;
}

function chipSend(el){document.getElementById('inp').value=el.textContent;send()}

// ── Restore history ───────────────────────────────────────
function restoreH(){
  history=loadH().filter(m=>m.role!=='system');
  if(!history.length)return;
  hideW();
  history.slice(-14).forEach(m=>{
    const t=new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if(m.role==='user')addMsg('user',`<div class="bubble">${esc(m.content)}</div>`,t);
    else if(m.role==='assistant')addMsg('ai',`<div class="ai-content">${renderAI(m.content)}</div>`,t);
  });
}

// ── Particles ─────────────────────────────────────────────
function initParticles(){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  let pts=[];
  function resize(){cv.width=innerWidth;cv.height=innerHeight}
  resize();addEventListener('resize',resize);
  class P{
    constructor(){this.reset(true)}
    reset(r){
      this.x=Math.random()*cv.width;
      this.y=r?Math.random()*cv.height:cv.height+5;
      this.radius=Math.random()*1.1+.2;
      this.vx=(Math.random()-.5)*.22;
      this.vy=-(Math.random()*.32+.08);
      this.op=Math.random()*.35+.05;
      this.life=0;this.max=Math.random()*320+200;
      this.blue=Math.random()>.6;
    }
    tick(){this.x+=this.vx;this.y+=this.vy;this.life++;if(this.life>this.max||this.y<-5)this.reset(false)}
    draw(){
      const p=this.life/this.max;
      const a=p<.1?p/.1:p>.8?1-(p-.8)/.2:1;
      ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
      // Get current accent color
      const ac=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#479DFF';
      ctx.fillStyle=this.blue?`${ac}${Math.round(this.op*a*.65*255).toString(16).padStart(2,'0')}`:`rgba(210,230,255,${this.op*a*.25})`;
      ctx.fill();
    }
  }
  for(let i=0;i<65;i++){const p=new P();p.life=Math.random()*p.max;pts.push(p)}
  function loop(){ctx.clearRect(0,0,cv.width,cv.height);pts.forEach(p=>{p.tick();p.draw()});requestAnimationFrame(loop)}
  loop();
}

// ── Boot ──────────────────────────────────────────────────
(async()=>{
  alerts=loadAlerts();
  initParticles();
  applyAccent('swap');
  updateChips();
  await initTON();

  if(!history.length)greetNoWallet();
  setInterval(loadMarket,60000);
  setInterval(checkAlerts,30000);
  if(walletOK) setInterval(refreshWalletData, 30000);
})();
</script>

<script>
(function(){
  var cv=document.getElementById('splashCanvas'),ctx=cv.getContext('2d');
  var W,H,frame=0,floor=0;
  var splashHidden=false,contentShown=false,autoTimer=null;

  var B={x:0,y:-80,vy:11,bounces:0,phase:'drop',r:32};
  var M={t:0,x:0,y:0,r:32,targetY:0,fx:0,fy:0,fr:0};
  var squish={t:0}; // squish timer per bounce

  function resize(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
    floor=H*0.54; M.targetY=H*0.35;
    if(B.phase==='drop'&&B.y<0) B.x=W/2;
  }

  function drawShape(x,y,r,morphT,squishX,squishY,textAlpha){
    morphT=Math.max(0,Math.min(1,morphT));
    var et=morphT*morphT*(3-2*morphT);

    ctx.save();
    ctx.translate(x,y);
    ctx.scale(squishX,squishY);
    ctx.translate(-x,-y);
    ctx.fillStyle='#2563eb';
    ctx.beginPath();
    var N=256;
    for(var i=0;i<=N;i++){
      var frac=i/N, angle=frac*Math.PI*2;
      var cx2=x+r*Math.cos(angle), cy2=y+r*Math.sin(angle);
      var seg=((angle-Math.PI/8+Math.PI*2)%(Math.PI*2))/(Math.PI*2)*8;
      var si=Math.floor(seg), sf=seg-si;
      var a0=(si/8)*Math.PI*2+Math.PI/8, a1=((si+1)/8)*Math.PI*2+Math.PI/8;
      var ox=x+r*Math.cos(a0)+(r*Math.cos(a1)-r*Math.cos(a0))*sf;
      var oy=y+r*Math.sin(a0)+(r*Math.sin(a1)-r*Math.sin(a0))*sf;
      var nx=cx2+(ox-cx2)*et, ny=cy2+(oy-cy2)*et;
      i===0?ctx.moveTo(nx,ny):ctx.lineTo(nx,ny);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    if(textAlpha>0){
      ctx.save();
      ctx.globalAlpha=textAlpha;
      ctx.fillStyle='#ffffff';
      ctx.font='bold '+(r*0.78)+'px "Bebas Neue",sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('SAGE',x,y+2);
      ctx.restore();
    }
  }

  function showContent(){
    if(contentShown)return; contentShown=true;
    ['spSub','spBadge','spBtn'].forEach(function(id,i){
      setTimeout(function(){
        var el=document.getElementById(id);
        if(el){el.style.opacity=1;el.style.transform='translateY(0)';}
      },i*180+250);
    });
    autoTimer=setTimeout(hideSplash,4500);
  }

  window.hideSplash=function(){
    if(splashHidden)return; splashHidden=true;
    if(autoTimer)clearTimeout(autoTimer);
    var s=document.getElementById('splash');
    s.style.transition='opacity .7s ease';
    s.style.opacity=0;
    setTimeout(function(){s.style.display='none';},750);
  };

  function animate(){
    frame++;
    ctx.clearRect(0,0,W,H);

    if(B.phase==='drop'){
      B.vy+=0.6; B.y+=B.vy;

      // Squish on bounce — quick spring back
      var sx=1, sy=1;
      if(squish.t>0){
        var sq=Math.sin(squish.t*Math.PI);
        sx=1+sq*0.35; sy=1-sq*0.3;
        squish.t=Math.max(0,squish.t-0.08);
      }

      if(B.y+B.r>=floor){
        B.y=floor-B.r; B.bounces++;
        squish.t=1;
        if(B.bounces===1) B.vy=-B.vy*0.52;
        else if(B.bounces===2) B.vy=-B.vy*0.36;
        else{ B.phase='morph'; M.t=0; M.x=B.x; M.y=floor-B.r; M.r=B.r; }
      }

      drawShape(B.x,B.y,B.r,0,sx,sy,0);
    }

    if(B.phase==='morph'){
      M.t+=0.013;
      var t=Math.min(M.t,1);
      var ease=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
      M.y=(floor-M.r)+(M.targetY-(floor-M.r))*ease;
      var r=M.r*(1+ease*0.15);
      var textA=Math.max(0,(t-0.5)*2);
      drawShape(M.x,M.y,r,t,1,1,textA);
      if(M.t>=1){ B.phase='done'; M.fx=M.x; M.fy=M.y; M.fr=r; showContent(); }
    }

    if(B.phase==='done'&&M.fx){
      drawShape(M.fx,M.fy,M.fr,1,1,1,1);
    }

    if(!splashHidden) requestAnimationFrame(animate);
  }

  window.addEventListener('resize',resize);
  resize();
  requestAnimationFrame(animate);
})();
</script>
